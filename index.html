
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>H-agent</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; touch-action:manipulation; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; background:#0b0b0b; color:#f0f0f0; font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',sans-serif; font-size:16px; line-height:1.6; overflow:hidden; user-select:none; -webkit-tap-highlight-color:transparent; -webkit-overflow-scrolling:touch; }
    ::-webkit-scrollbar { width:4px; background:#1a1a1a; }
    ::-webkit-scrollbar-thumb { background:#444; border-radius:4px; }
    #optionsContainer::-webkit-scrollbar { width:5px; background:transparent; }
    #optionsContainer::-webkit-scrollbar-thumb { background:#555; border-radius:3px; }
    #optionsContainer::-webkit-scrollbar-thumb:hover { background:#777; }
    input,textarea,select,button { font-family:inherit; font-size:16px; background:#1a1a1a; color:#f0f0f0; border:1px solid #333; border-radius:6px; padding:12px 16px; outline:none; transition:border 0.15s; }
    input:focus,textarea:focus,select:focus { border-color:#7a5cf0; }
    button { cursor:pointer; background:#2a2a2a; border:1px solid #444; font-weight:500; padding:10px 20px; }
    button:hover { background:#3a3a3a; border-color:#7a5cf0; }
    button { min-height:40px; min-width:40px; }
    button:active { transform:scale(0.97); }
    .btn-primary { background:#7a5cf0; border-color:#7a5cf0; color:#fff; }
    .btn-primary:hover { background:#6a4ce0; }
    .btn-danger { background:#c0392b; border-color:#c0392b; }
    .btn-danger:hover { background:#e74c3c; }
    .btn-sm { padding:10px 18px; font-size:14px; min-height:42px; }
    .btn-xs { padding:8px 14px; font-size:13px; border-radius:6px; min-height:36px; }
    .hidden { display:none !important; }
    .flex-center { display:flex; align-items:center; justify-content:center; }
    .flex-col { display:flex; flex-direction:column; }
    .gap-8 { gap:8px; } .gap-12 { gap:12px; } .gap-16 { gap:16px; }
    .w-full { width:100%; } .text-center { text-align:center; }
    .text-muted { color:#888; } .text-sm { font-size:14px; } .text-xs { font-size:12px; }
    .mt-8 { margin-top:8px; } .mt-16 { margin-top:16px; } .mb-8 { margin-bottom:8px; } .mb-16 { margin-bottom:16px; }
    .flex-1 { flex:1; } .overflow-y { overflow-y:auto; } .relative { position:relative; }
    .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.8); z-index:1000; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .modal-box { background:#161616; border:1px solid #2a2a2a; border-radius:16px; padding:28px 24px; max-width:600px; width:100%; max-height:85vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.8); -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
    .modal-box h2 { font-size:20px; font-weight:600; margin-bottom:20px; color:#fff; letter-spacing:0.5px; }
    .modal-box label { display:block; font-size:14px; color:#aaa; margin-bottom:4px; margin-top:12px; }
    .modal-box label:first-of-type { margin-top:0; }
    .modal-actions { display:flex; gap:12px; margin-top:24px; justify-content:flex-end; }
    .fullscreen-page { position:fixed; top:0; left:0; right:0; bottom:0; background:#0b0b0b; z-index:900; display:flex; flex-direction:column; overflow:hidden; }
    .fullscreen-page .page-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #1f1f1f; flex-shrink:0; min-height:52px; }
    .fullscreen-page .page-header .page-title { font-size:17px; font-weight:600; color:#f0f0f0; }
    .fullscreen-page .page-body { flex:1; overflow-y:auto; padding:16px; }
    .fullscreen-page .page-footer { flex-shrink:0; padding:12px 16px; border-top:1px solid #1f1f1f; background:#0b0b0b; }
    #mainApp { display:flex; flex-direction:column; height:100vh; max-height:100vh; }
    #mainTopBar { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-bottom:1px solid #1f1f1f; flex-shrink:0; min-height:48px; background:#0b0b0b; z-index:10; }
    #mainTopBar .app-title { font-size:15px; font-weight:600; color:#f0f0f0; letter-spacing:2px; }
    #mainStoryArea { flex:1; overflow-y:auto; padding:16px 14px; background:#0b0b0b; }
    #mainStoryArea .story-empty { color:#555; text-align:center; margin-top:40px; font-size:15px; }
    .story-msg { padding:10px 12px; margin-bottom:8px; border-radius:8px; background:#121212; border-left:3px solid #7a5cf0; position:relative; word-wrap:break-word; white-space:pre-wrap; }
    .story-msg .msg-role { font-size:12px; color:#7a5cf0; font-weight:500; margin-bottom:4px; }
    .story-msg .msg-content { font-size:15px; color:#f0f0f0; }
    .story-msg.user-msg { text-align:right; background:#1a1410; border-left:none; border-right:3px solid #c9a030; }
    .story-msg.user-msg .msg-role { color:#c9a030; }
    .story-msg.user-msg .msg-content { display:inline-block; text-align:left; }
    #mainBottomBar { flex-shrink:0; background:#0f0f0f; border-top:1px solid #1f1f1f; padding:8px 12px 12px; display:flex; flex-direction:column; }
    #optionsContainer { display:flex; flex-direction:column; gap:8px; overflow-y:auto; padding:4px 4px 8px 0; max-height:180px; }
    .opt-btn { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:20px; padding:12px 22px; font-size:15px; color:#ddd; cursor:pointer; white-space:normal; word-break:break-word; text-align:left; min-height:44px; }
    .opt-btn:hover { background:#2a2a2a; border-color:#7a5cf0; color:#fff; }
    #customInputArea { display:flex; gap:8px; align-items:center; padding-top:6px; border-top:1px solid #1a1a1a; flex-shrink:0; }
    #customInputArea input { flex:1; padding:10px 14px; border-radius:24px; background:#1a1a1a; border:1px solid #2a2a2a; color:#f0f0f0; font-size:15px; }
    #customInputArea button { border-radius:24px; padding:10px 20px; background:#7a5cf0; border:none; color:#fff; font-weight:500; }
    .settings-section { margin-bottom:28px; }
    .settings-section h3 { font-size:16px; font-weight:600; color:#ccc; margin-bottom:12px; border-bottom:1px solid #1f1f1f; padding-bottom:6px; }
    .settings-section .field-row { display:flex; flex-wrap:wrap; align-items:center; gap:8px 12px; margin-bottom:10px; }
    .settings-section .field-row label { font-size:14px; color:#aaa; min-width:80px; }
    .settings-section .field-row input,.settings-section .field-row select,.settings-section .field-row textarea { flex:1; min-width:120px; }
    .settings-section .field-row textarea { min-height:60px; resize:vertical; }
    .settings-section .desc { font-size:13px; color:#666; margin-top:4px; }
    .model-list-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid #1a1a1a; }
    .model-list-item span { flex:1; font-size:14px; }
    .model-list-item button { flex-shrink:0; }
    .card-item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:#141414; border-radius:8px; margin-bottom:6px; border:1px solid #1f1f1f; }
    .card-item .card-name { flex:1; font-size:15px; font-weight:500; }
    .card-item .card-actions { display:flex; gap:6px; }
    .card-select-item { display:flex; align-items:center; gap:12px; padding:14px 16px; background:#141414; border-radius:8px; margin-bottom:8px; border:1px solid #1f1f1f; cursor:pointer; transition:background 0.15s; min-height:52px; }
    .card-select-item:hover { background:#1e1e1e; }
    .card-select-item.selected { background:#2a1f4a; border-color:#7a5cf0; }
    .card-select-item .card-name { flex:1; font-size:15px; }
    .card-select-item .card-check { width:26px; height:26px; border-radius:6px; border:2px solid #444; display:flex; align-items:center; justify-content:center; font-size:14px; color:#7a5cf0; flex-shrink:0; }
    .card-select-item.selected .card-check { border-color:#7a5cf0; background:#7a5cf0; color:#fff; }
    .card-select-item.user-card { border:2px solid #c9a030; }
    .card-select-item.user-card.selected { background:#2a1f0a; border-color:#e8c84a; }
    .card-user-badge { display:inline-flex; align-items:center; font-size:10px; color:#c9a030; background:rgba(201,160,48,0.15); padding:2px 6px; border-radius:4px; margin-right:6px; flex-shrink:0; line-height:1.4; }
    .progress-container { margin-top:10px; height:6px; background:#333; border-radius:3px; overflow:hidden; }
    .progress-bar { height:100%; background:#7a5cf0; width:0%; transition:width 0.3s ease; }
    .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#2a2a2a; color:#f0f0f0; padding:10px 24px; border-radius:30px; font-size:14px; z-index:2000; box-shadow:0 4px 20px rgba(0,0,0,0.6); border:1px solid #3a3a3a; animation:toastIn 0.25s ease; }
    @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(20px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    textarea.code-area { font-family:'Courier New',monospace; font-size:13px; background:#0f0f0f; color:#ddd; border:1px solid #2a2a2a; padding:10px; width:100%; min-height:80px; resize:vertical; }
    .checkbox-group { display:flex; flex-direction:column; gap:6px; }
    .checkbox-group label { display:flex; align-items:center; gap:10px; color:#aaa; cursor:pointer; font-size:14px; padding:6px 0; min-height:38px; }
    .checkbox-group input[type="checkbox"] { accent-color:#7a5cf0; width:22px; height:22px; flex-shrink:0; }
    @media (max-width:600px) {
      .modal-box { padding:20px 16px; border-radius:12px; max-width:100%; max-height:80vh; }
      #mainTopBar { padding:6px 8px; min-height:42px; }
      .settings-section .field-row { flex-direction:column; align-items:stretch; }
      .settings-section .field-row label { min-width:auto; }
      .btn-sm { padding:8px 16px; font-size:13px; min-height:44px; }
      .collapse-header { padding:14px 14px; font-size:15px; }
      .card-select-item { padding:14px; gap:10px; }
      .opt-btn { padding:14px 18px; font-size:15px; }
      .btn-xs { padding:6px 12px; font-size:12px; min-height:34px; }
      input,textarea,select { font-size:16px; padding:12px 14px; }
      .checkbox-group input[type="checkbox"] { width:24px; height:24px; }
    }
    .collapse-section { border:1px solid #1f1f1f; border-radius:8px; margin-bottom:12px; overflow:hidden; }
    .collapse-header { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; background:#141414; cursor:pointer; user-select:none; min-height:48px; }
    .collapse-header:hover { background:#1a1a1a; }
    .collapse-header .collapse-title { font-size:14px; font-weight:600; color:#ccc; }
    .collapse-header .collapse-arrow { font-size:11px; color:#666; transition:transform 0.2s; }
    .collapse-header.open .collapse-arrow { transform:rotate(90deg); }
    .collapse-body { padding:12px 14px; display:none; }
    .collapse-body.open { display:block; }
    .import-two-col { display:flex; gap:16px; }
    .import-col { flex:1; min-width:0; }
    .import-col h4 { font-size:14px; color:#aaa; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid #1f1f1f; }
    .wb-item { display:flex; align-items:center; gap:8px; padding:8px 10px; background:#141414; border-radius:6px; margin-bottom:4px; border:1px solid #1f1f1f; }
    .wb-item .wb-name { flex:1; font-size:14px; }
  </style>
</head>
<body>
  <div id="mainApp">
    <div id="mainTopBar">
      <div style="display:flex;align-items:center;gap:8px;flex:1;">
        <button id="debugToggleBtn" style="background:transparent;border:1px solid #333;border-radius:4px;padding:2px 8px;font-size:11px;color:#888;">调试</button>
        <span class="app-title">H-agent</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        <button id="cardImportBtn" style="background:transparent;border:1px solid #333;border-radius:6px;padding:4px 12px;font-size:13px;color:#ccc;">载入管理</button>
        <button id="settingsBtn" style="background:transparent;border:1px solid #333;border-radius:6px;padding:4px 12px;font-size:13px;color:#ccc;">设置</button>
      </div>
    </div>
    <div id="mainStoryArea">
      <div class="story-empty" id="storyEmptyHint">等待开始... 请先设置API并导入角色卡</div>
      <div id="storyMessages"></div>
    </div>
    <div id="mainBottomBar">
      <div id="optionsContainer"></div>
      <div id="customInputArea">
        <input type="text" id="customInput" placeholder="输入自定义内容..." />
        <button id="sendCustomBtn">发送</button>
      </div>
    </div>
  </div>

  <!-- API设置模态 -->
  <div class="modal-overlay hidden" id="apiSetupModal">
    <div class="modal-box">
      <h2>API 设置</h2>
      <label>Base URL</label>
      <input type="text" id="apiBaseUrl" value="https://api.deepseek.com" />
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="输入你的 API Key" />
      <label>模型</label>
      <select id="apiModelSelect">
        <option value="deepseek-v4-flash">deepseek-v4-flash (默认)</option>
        <option value="deepseek-v4-pro">deepseek-v4-pro</option>
      </select>
      <label>思考强度</label>
      <select id="apiReasoningEffort">
        <option value="off">Off (禁用)</option>
        <option value="high" selected>High (推荐)</option>
        <option value="max">Max (最强)</option>
      </select>
      <label>API MaxToken</label>
      <input type="number" id="apiMaxTokens" value="384000" min="1000" max="500000" step="1000" />
      <div class="text-sm text-muted mt-8">提示: 可在设置中添加更多模型</div>
      <div class="modal-actions">
        <button id="apiTestBtn" class="btn-primary">测试连接</button>
        <button id="apiConfirmBtn">确认</button>
      </div>
      <div id="apiTestResult" class="text-sm mt-8" style="color:#888;"></div>
    </div>
  </div>

  <!-- 设置页面 -->
  <div class="fullscreen-page hidden" id="settingsPage">
    <div class="page-header">
      <span class="page-title">设置</span>
      <button id="settingsCloseBtn" style="background:transparent;border:1px solid #333;border-radius:6px;padding:4px 14px;color:#ccc;">关闭</button>
    </div>
    <div class="page-body">

      <!-- === API 区 === -->
      <div class="collapse-section">
        <div class="collapse-header open" data-collapse="api"><span class="collapse-title">API 设置</span><span class="collapse-arrow">▼</span></div>
        <div class="collapse-body open" id="collapse-api">
          <div class="field-row"><label>Base URL</label><input type="text" id="setApiBaseUrl" value="https://api.deepseek.com" /></div>
          <div class="field-row"><label>API Key</label><input type="password" id="setApiKey" placeholder="输入 API Key" /></div>
          <div class="field-row"><label>当前模型</label><select id="setModelSelect" style="flex:1;"></select></div>
          <div class="field-row"><label>思考强度</label><select id="setReasoningEffort" style="flex:1;"><option value="off">Off (禁用)</option><option value="high">High (推荐)</option><option value="max">Max (最强)</option></select></div>
          <div class="field-row"><label>API MaxToken</label><input type="number" id="setApiMaxTokens" value="384000" min="1000" max="500000" step="1000" style="flex:1;" /></div>
          <div class="field-row"><label>累计消耗</label><span id="cumulativeTokensDisplay" class="text-sm" style="color:#888;">0</span></div>
          <div class="field-row"><label>添加模型</label><input type="text" id="newModelName" placeholder="模型名称" style="flex:1;" /><button id="addModelBtn" class="btn-sm btn-primary">添加</button></div>
          <div id="modelListContainer" class="mt-8"></div>
          <div class="field-row mt-8"><button id="setApiTestBtn" class="btn-sm">测试API连接</button><span id="setApiTestResult" class="text-xs text-muted"></span></div>
        </div>
      </div>

      <!-- === 叙事区 === -->
      <div class="collapse-section">
        <div class="collapse-header" data-collapse="narrative"><span class="collapse-title">叙事模块</span><span class="collapse-arrow">▶</span></div>
        <div class="collapse-body" id="collapse-narrative">
          <div class="field-row"><label>当前模块</label><textarea id="narrativeModuleEditor" rows="6" class="code-area" style="min-height:150px;"></textarea></div>
          <div class="field-row"><button id="resetNarrativeBtn" class="btn-sm">恢复默认</button><button id="applyNarrativeBtn" class="btn-sm btn-primary">应用</button></div>
          <div class="desc">主叙事AI的个性配置。</div>
          <div class="field-row mt-8"><label>选择档位</label><select id="narrativePresetSelect" style="flex:1;"><option value="default">默认小说家</option></select></div>
          <hr style="border-color:#1f1f1f;margin:14px 0;" />
          <div class="text-sm text-muted mb-8">训练叙事模块</div>
          <div class="field-row"><label>范文/素材</label><textarea id="trainMaterialNarrative" rows="5" class="code-area" placeholder="粘贴色情文字，学习文风和词汇..."></textarea></div>
          <div class="field-row"><button id="trainNarrativeBtn" class="btn-sm btn-primary">开始训练</button><span id="trainNarrativeStatus" class="text-xs text-muted"></span></div>
          <hr style="border-color:#1f1f1f;margin:14px 0;" />
          <div class="text-sm text-muted mb-8">大纲管理</div>
          <textarea id="outlineEditor" rows="4" class="code-area" style="min-height:80px;" placeholder="当前故事大纲..."></textarea>
          <div class="field-row mt-8"><button id="saveOutlineBtn" class="btn-sm btn-primary">保存</button><button id="clearOutlineBtn" class="btn-sm">清空</button><button id="regenerateOutlineBtn" class="btn-sm btn-primary">重新生成</button></div>
        </div>
      </div>

      <!-- === 角色卡与偏好区 === -->
      <div class="collapse-section">
        <div class="collapse-header" data-collapse="cards"><span class="collapse-title">角色卡与偏好</span><span class="collapse-arrow">▶</span></div>
        <div class="collapse-body" id="collapse-cards">
          <div class="text-sm text-muted mb-8">角色卡管理</div>
          <div id="cardListContainer"><div class="text-muted text-sm">暂无角色卡</div></div>
          <div class="field-row mt-8"><input type="text" id="genCardDesc" placeholder="一句话描述角色" style="flex:1;" /><button id="genCardBtn" class="btn-sm btn-primary">AI生成</button></div>
          <div class="field-row"><input type="text" id="newCardName" placeholder="手动添加: 角色名" style="flex:1;" /><button id="addCardBtn" class="btn-sm">添加空白卡</button></div>
          <hr style="border-color:#1f1f1f;margin:14px 0;" />
          <div class="text-sm text-muted mb-8">训练角色卡</div>
          <div class="field-row"><label>参考材料</label><textarea id="trainMaterialCard" rows="5" class="code-area" placeholder="粘贴描述角色性格、外貌、口癖的文本..."></textarea></div>
          <div class="field-row"><button id="trainCardBtn" class="btn-sm btn-primary">训练生成角色卡</button></div>
          <hr style="border-color:#1f1f1f;margin:14px 0;" />
          <div class="text-sm text-muted mb-8">偏好选项</div>
          <div class="field-row"><label>故事方式</label><select id="prefStyle"><option value="叙述体">叙述体</option><option value="对话体">对话体</option><option value="混合体" selected>混合体</option></select></div>
          <div class="field-row"><label>长度限制</label><select id="prefLength"><option value="100">100字以上</option><option value="300">300字以上</option><option value="500" selected>500字以上</option><option value="1000">1000字以上</option><option value="2000">2000字以上</option><option value="5000">5000字以上</option><option value="10000">10000字以上</option></select></div>
          <div class="field-row"><label>偏好场景</label><input type="text" id="prefScenes" placeholder="例如: 卧室、浴室、办公室" /></div>
          <div class="field-row"><label>偏好玩法</label><input type="text" id="prefPlay" placeholder="例如: 支配、温柔、角色扮演" /></div>
          <div class="field-row"><label>体位偏好</label><input type="text" id="prefPosition" placeholder="例如: 背后位、骑乘位" /></div>
          <div class="field-row"><label>额外限制</label><input type="text" id="prefLimits" placeholder="例如: 避免暴力、特定词汇禁用" /></div>
          <div class="field-row"><label>高潮要求</label><select id="prefOrgasm"><option value="多次高潮">多次高潮</option><option value="单次高潮">单次高潮</option><option value="无要求" selected>无要求</option></select></div>
          <div class="field-row"><label>射精部位偏好</label><input type="text" id="prefCum" placeholder="例如: 内射、颜射、体外" /></div>
          <div class="field-row"><label>叙事节奏</label><select id="prefPace"><option value="慢玩">慢玩 (细腻铺陈)</option><option value="均衡" selected>均衡 (标准节奏)</option><option value="激烈">激烈 (快速推进)</option></select></div>
          <div class="field-row"><label>大纲时长</label><select id="prefOutlineLength"><option value="短篇">短篇 (5~8节拍)</option><option value="中篇" selected>中篇 (8~15节拍)</option><option value="长篇">长篇 (15~25节拍)</option><option value="史诗">史诗 (25+节拍)</option></select></div>
        </div>
      </div>

      <!-- === 世界书区 === -->
      <div class="collapse-section">
        <div class="collapse-header" data-collapse="world"><span class="collapse-title">世界书</span><span class="collapse-arrow">▶</span></div>
        <div class="collapse-body" id="collapse-world">

      classifyError(err) {
        const msg = (err.message||'').toLowerCase();
        const status = err.status || 0;
        if (status===401||status===403||msg.includes('auth')||msg.includes('unauthorized')||msg.includes('key')) return ERROR_CODES.API_AUTH_FAILED;
        if (status===429||msg.includes('rate')||msg.includes('limit')||msg.includes('too many')) return ERROR_CODES.API_RATE_LIMIT;
        if (status>=500||msg.includes('server error')||msg.includes('internal error')) return ERROR_CODES.API_SERVER_5XX;
        if (msg.includes('timeout')||msg.includes('timed out')||err.name==='AbortError') return ERROR_CODES.API_TIMEOUT;
        if (msg.includes('network')||msg.includes('fetch')||msg.includes('connection')||msg.includes('econnrefused')) return ERROR_CODES.API_NETWORK;
        return null;
      },
      shouldRetry(err) {
        const def = this.classifyError(err);
        if (!def||!def.retry) return false;
        const key = def.code+'_api';
        this.retryCounts[key] = (this.retryCounts[key]||0)+1;
        return this.retryCounts[key] <= (def.maxRetries||3);
      },
      getRetryDelay(err) {
        const def = this.classifyError(err);
        const count = this.retryCounts[(def?.code||'UNKNOWN')+'_api']||1;
        return (def?.backoff||1000)*Math.pow(2,count-1);
      },
      resetRetry(err) {
        const def = this.classifyError(err);
        if (def) delete this.retryCounts[def.code+'_api'];
      }
    };

    /* ================== API调用（真流式+工具循环） ================== */
    async function callAPI(messages, options = {}) {
      let controller;
      try {

      const {
        model = state.model, baseUrl = state.apiBaseUrl, apiKey = state.apiKey,
        maxTokens = state.apiMaxTokens, temperature = 0.9,
        reasoning_effort = state.reasoningEffort, signal,
        trackUsage = true, enableTools = false
      } = options;
      if (!apiKey) throw new Error('API Key 未设置');
      const url = baseUrl.replace(/\/+$/, '') + '/chat/completions';
      controller = new AbortController();
      const currentSignal = signal || controller.signal;
      if (!signal) state.abortController = controller;

      let currentMessages = [...messages];
      let loopGuard = 10;

      // === 阶段一：工具调用循环（非流式，静默） ===
      while (enableTools && loopGuard-- > 0) {
        const body = {
          model, messages: currentMessages, stream: false, max_tokens: maxTokens, temperature,
          tools: [MEMORY_TOOL], tool_choice: "auto"
        };
        if (reasoning_effort !== 'off') { body.thinking = { type: 'enabled' }; body.reasoning_effort = reasoning_effort; }
        debugLog(`[工具轮] API请求: ${model}`);

        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
          body: JSON.stringify(body), signal: currentSignal
        });
        if (!res.ok) {
          let errMsg = `HTTP ${res.status}`;
          try { const e = await res.json(); errMsg = e.error?.message || errMsg; } catch (e) {}
          const err = new Error('API错误: ' + errMsg);
          err.status = res.status;
          throw err;
        }
        const data = await res.json();
        const msg = data.choices?.[0]?.message;
        const usage = data.usage || {};
        const used = (usage.prompt_tokens || 0) + (usage.completion_tokens || 0);
        if (trackUsage && used) { state.cumulativeTokens += used; updateCumulativeDisplay(); saveState(); }

        if (msg?.tool_calls?.length) {
          debugLog(`[工具调用] ${msg.tool_calls.map(t => t.function.name).join(',')}`);
          currentMessages.push({ role: 'assistant', content: msg.content || '', tool_calls: msg.tool_calls });
          for (const tc of msg.tool_calls) {
            if (tc.function.name === 'recall_context') {
              const args = JSON.parse(tc.function.arguments || '{}');
              const result = recallContext(args);
              currentMessages.push({ role: 'tool', tool_call_id: tc.id, content: result });
              debugLog(`[工具结果] 返回${result.length}字符`);
            }
          }
        } else {
          break;
        }
      }

      // === 阶段二：最终流式输出 ===
      const finalBody = {
        model, messages: currentMessages, stream: true, max_tokens: maxTokens, temperature
      };
      if (enableTools) {
        finalBody.tools = [MEMORY_TOOL];
        finalBody.tool_choice = "auto";
      }
      if (reasoning_effort !== 'off') { finalBody.thinking = { type: 'enabled' }; finalBody.reasoning_effort = reasoning_effort; }
      debugLog(`[流式] 开始输出, 消息数${currentMessages.length}, 工具:${enableTools ? 'on' : 'off'}`);

      const streamRes = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify(finalBody), signal: currentSignal
      });
      if (!streamRes.ok) {
        let errMsg = `HTTP ${streamRes.status}`;
        try { const e = await streamRes.json(); errMsg = e.error?.message || errMsg; } catch (e) {}
        const err = new Error('API错误: ' + errMsg);
        err.status = streamRes.status;
        throw err;
      }

      const reader = streamRes.body.getReader();
      const decoder = new TextDecoder();
      let fullContent = '';
      let buffer = '';

      try {
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed || !trimmed.startsWith('data:')) continue;
            const jsonStr = trimmed.slice(5).trim();
            if (jsonStr === '[DONE]') continue;
            try {
              const chunk = JSON.parse(jsonStr);
              const deltaObj = chunk.choices?.[0]?.delta;
              if (deltaObj?.content) {
                fullContent += deltaObj.content;
                if (options.onChunk) options.onChunk({ delta: deltaObj.content, full: fullContent });
              }
            } catch (e) { debugLog('[流式解析异常] ' + e.message + ' | raw=' + trimmed.slice(0,80)); }
          }
        }
        // 处理流结束后 buffer 残余
        if (buffer.trim()) {
          const trimmed = buffer.trim();
          if (trimmed.startsWith('data:')) {
            const jsonStr = trimmed.slice(5).trim();
            if (jsonStr !== '[DONE]') {
              try {
                const chunk = JSON.parse(jsonStr);
                const deltaObj = chunk.choices?.[0]?.delta;
                if (deltaObj?.content) {
                  fullContent += deltaObj.content;
                  if (options.onChunk) options.onChunk({ delta: deltaObj.content, full: fullContent });
                }
              } catch (e) { debugLog('[残余buffer解析异常] ' + e.message); }
            }
          }
        }
      } finally {
        reader.releaseLock();
      }

      if (trackUsage) {
        const estimated = Math.floor(fullContent.length * 2);
        state.cumulativeTokens += estimated;
        updateCumulativeDisplay();
        saveState();
      }
      if (state.abortController === controller) state.abortController = null;
      return fullContent;

      } catch (e) {
        if (state.abortController === controller) state.abortController = null;
        if (e.name === 'AbortError') throw new Error('请求已取消');
        if (errorHandler.shouldRetry(e)) {
          const delay = errorHandler.getRetryDelay(e);
          updateLoading(`请求失败，${(delay/1000).toFixed(0)}秒后重试...`, 50);
          await new Promise(r => setTimeout(r, delay));
          return callAPI(messages, options);
        }
        errorHandler.resetRetry(e);
        throw e;
      }
    }

    function updateCumulativeDisplay() {
      const el = document.getElementById('cumulativeTokensDisplay');
      if (el) {
        if (state.cumulativeTokens >= 1000000) {
          el.textContent = `${(state.cumulativeTokens / 1000000).toFixed(1)}M`;
        } else {
          el.textContent = `${(state.cumulativeTokens / 1000).toFixed(1)}K`;
        }
      }
    }

    function cancelCurrentRequest() {
      stopFakeProgress();  // ✅ 新增

        state.abortController.abort();
        debugLog('手动取消请求');
      }
    }

    /* ================== 进度与UI ================== */
    let _fakeProgressTimer = null;  // ✅ 必须声明

    function startFakeProgress(fromPercent) {  // ✅ 新增
      stopFakeProgress();
      let p = fromPercent || 0;
      _fakeProgressTimer = setInterval(() => {
        if (p < 30)       p += 2;
        else if (p < 60)  p += 0.8;
        else if (p < 85)  p += 0.3;
        else              p += 0.1;
        if (p >= 92) p = 92;
        document.getElementById('progressBar').style.width = p + '%';
      }, 250);
    }

    function stopFakeProgress() {  // ✅ 新增

        clearInterval(_fakeProgressTimer);
        _fakeProgressTimer = null;
      }
    }

    function updateLoading(phase, progress) {
      document.getElementById('loadingHint').textContent = phase;
      document.getElementById('progressBar').style.width = Math.min(100, progress) + '%';
    }

    function showLoading() { document.getElementById('loadingModal').classList.remove('hidden'); }

    function hideLoading() {  // ✅ 修改：自动清理假进度
      stopFakeProgress();
      document.getElementById('loadingModal').classList.add('hidden');
    }

    function updateUI() { renderStory(); renderOptions(); }

    function smartScrollToBottom(container, threshold = 50) {
      const isNearBottom = container.scrollHeight - container.scrollTop - container.clientHeight <= threshold;
      if (isNearBottom) {
        container.scrollTop = container.scrollHeight;
      }
    }

    let _streamRafPending = false;
    let _streamPendingEl = null;
    let _streamPendingFull = '';
    function _flushStreamDom() {
      if (_streamPendingEl) {
        _streamPendingEl.textContent = _streamPendingFull;
        smartScrollToBottom(document.getElementById('mainStoryArea'));
      }
      _streamPendingEl = null;
      _streamPendingFull = '';
      _streamRafPending = false;
    }
    function rAFUpdateContent(contentEl, full) {
      contentEl.textContent = full;
      smartScrollToBottom(document.getElementById('mainStoryArea'));
      _streamPendingEl = contentEl;
      _streamPendingFull = full;
      if (!_streamRafPending) {
        _streamRafPending = true;
        requestAnimationFrame(_flushStreamDom);
      }
    }

    function renderStory() {
      const container = document.getElementById('storyMessages');
      const empty = document.getElementById('storyEmptyHint');
      const displayMsgs = state.history.filter(m => m.role !== 'system' && m.content);
      if (!displayMsgs.length) { container.innerHTML = ''; empty.classList.remove('hidden'); return; }
      empty.classList.add('hidden');
      let html = '';
      displayMsgs.forEach((msg, i) => {
        const isUser = msg.role === 'user';
        const userClass = isUser ? ' user-msg' : '';
        const roleHtml = isUser ? '<div class="msg-role">你</div>' : '';
        html += `<div class="story-msg${userClass}">${roleHtml}<div class="msg-content">${escapeHtml(msg.content)}</div></div>`;
      });
      container.innerHTML = html;
      smartScrollToBottom(document.getElementById('mainStoryArea'));
    }

    function renderOptions() {
      const container = document.getElementById('optionsContainer');
      if (!state.currentOptions || !state.currentOptions.length) {
        container.innerHTML = '<div class="text-muted text-sm">等待选项...</div>'; return;
      }
      let html = '';
      state.currentOptions.forEach((opt, idx) => {
        html += `<button class="opt-btn" data-opt-index="${idx}">${escapeHtml(opt)}</button>`;
      });
      container.innerHTML = html;

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    /* ================== 选项生成 ================== */
    async function generateOptionsFromContext() {
      const lastAssistant = [...state.history].reverse().find(m => m.role === 'assistant');
      if (!lastAssistant) return ['继续', '换个姿势', '温柔一些'];
      const plotContext = lastAssistant.content.slice(-5000);
      const optionsSys = buildOptionsSystemMessage();
      let userMsg = `当前剧情片段（仅用于生成选项，请勿续写）：\n${plotContext}`;
      if (state.outline) {
        userMsg += `\n\n当前大纲（参考，以此把握故事方向）：\n${state.outline}`;
      }
      userMsg += '\n\n基于以上剧情和大纲，请列出3-5个符合角色设定和偏好的后续行动选项。';
      const messages = [
        { role: 'system', content: optionsSys },
        { role: 'user', content: userMsg }
      ];
      for (let retry = 0; retry < 3; retry++) {
        try {
          if (retry > 0) debugLog(`[选项] 输出无效，重试第${retry}次`);
          const resp = await callAPI(messages, { maxTokens: state.apiMaxTokens, temperature: 0.7 });
          const opts = parseOptions(resp);
          if (opts.length >= 2) return opts;
        } catch (e) { debugLog('选项生成失败: ' + e.message); }
      }
      debugLog('[选项] 3次重试均失败，使用兜底');
      return ['继续', '换个姿势', '温柔一些'];
    }

    function parseOptions(text) {
      const lines = text.split('\n').map(l => l.trim()).filter(l => l);
      const options = [];
      for (const line of lines) {
        const clean = line.replace(/^[-*\d\.\、\s]+/, '').trim();
        if (clean && clean.length > 2) options.push(clean);
        if (options.length >= 6) break;
      }
      if (options.length < 2) options.push('继续', '换个姿势', '加快节奏');
      return options.slice(0, 6);
    }

    /* ================== 游戏核心 ================== */
    function getActiveCards() {
      return state.activeCards.length ? state.activeCards : state.cards.slice(0, 1);
    }

    async function startGame() {
      const activeCards = getActiveCards();
      if (!activeCards.length) { toast('请先导入角色卡'); return; }
      showLoading(); updateLoading('正在生成大纲...', 5);
      startFakeProgress(5);
      try {
        const outlineSys = buildOutlineSystemMessage();
        const outlineUserMsg = buildOutlineUserMessage();
        const outlineMessages = [{ role: 'system', content: outlineSys }, { role: 'user', content: outlineUserMsg }];
        let outline = '';
        for (let retry = 0; retry < 3; retry++) {
          if (retry > 0) { debugLog(`[大纲] 输出无效，重试第${retry}次`); updateLoading('重试生成大纲...', 5 + retry * 10); }
          outline = await callAPI(outlineMessages, { maxTokens: state.apiMaxTokens, temperature: 0.5 });
          const testMatch = outline.match(/\{[\s\S]*\}/);
          if (testMatch) {
            try { JSON.parse(testMatch[0]); break; } catch(e) { debugLog(`[大纲] 解析失败: ${e.message}`); }
          }
        }
        stopFakeProgress();
        updateLoading('正在生成大纲...', 100);
        const jsonMatch = outline.match(/\{[\s\S]*\}/);
        if (jsonMatch) {
          try {
            const parsed = JSON.parse(jsonMatch[0]);
            state.outline = parsed; state.currentBeatIndex = 0;
          } catch(e) {
            stopFakeProgress();
            toast('大纲生成不完整，请重试或增大字数偏好');
            debugLog('大纲解析失败: ' + e.message);
            hideLoading();
            return;
          }
        } else {
          stopFakeProgress();
          toast('大纲格式错误，请重试');
          hideLoading();
          return;
        }
        saveState();
        updateLoading('生成初始场景...', 30);
        const narrativeSys = buildNarrativeSystemMessage();
        const storyMessages = [
          { role: 'system', content: narrativeSys }
        ];
        const cardBlock = buildCardInjectionBlock(true);
        if (cardBlock) storyMessages.push({ role: 'system', content: cardBlock });
        // 动态上下文归入 user
        let userCtx = '';
        const wbBlock = buildWorldInjectionBlock();
        if (wbBlock) userCtx += wbBlock + '\n';
        if (outline) userCtx += '当前大纲（不输出）:\n' + (typeof outline === 'object' ? JSON.stringify(outline) : outline) + '\n';
        if (state.summaryBlocks.length) userCtx += '早期剧情摘要:\n' + state.summaryBlocks.join('\n---\n') + '\n';
        userCtx += '写故事开头。第一步：从世界书提取当前场景的空间锚点（地点、时间、光线、气味、温度、关键物件），第一段先建立场景氛围。第二步：让角色在场景中自然着陆——她现在靠在什么上面、站在哪里、在做什么。第三步：通过角色的身体状态、动作、环境的交互（光打在她皮肤上、空气的潮气黏在她身上等），用场景把角色卡的身体数据（体温、体味、敏感度等）带出来。不要列清单式介绍角色，让角色活在场景里。直接叙述，不准写系统消息或AI确认。';
        storyMessages.push({ role: 'user', content: userCtx });
        hideLoading();
        const storyEl = document.getElementById('storyMessages');
        const streamMsgEl = document.createElement('div');
        streamMsgEl.className = 'story-msg';
        streamMsgEl.innerHTML = '<div class="msg-content"></div>';
        storyEl.appendChild(streamMsgEl);
        smartScrollToBottom(document.getElementById('mainStoryArea'));
        const contentEl = streamMsgEl.querySelector('.msg-content');
        // ★ 先占位写入 history，流式过程中实时更新
        const assistantMsg = { role: 'assistant', content: '' };
        state.history = [assistantMsg];
        const story = await callAPI(storyMessages, {
          maxTokens: state.apiMaxTokens, temperature: 0.9, enableTools: true,
          onChunk: ({ full }) => {
            assistantMsg.content = full;  // ★ 实时同步到 history（内存操作，不同步会丢数据）
            rAFUpdateContent(contentEl, full);
          }
        });

        state.gameStarted = true;
        saveState();

        maybeAdvanceBeat(story);

        const optsEl = document.getElementById('optionsContainer');
        optsEl.innerHTML = '<div style="color:#888;padding:8px;font-size:13px;">生成选项...</div>';
        const opts = await generateOptionsFromContext();
        state.currentOptions = opts;
        saveState();
        _flushStreamDom();
        updateUI();
        toast('故事开始!');
      } catch (e) {
        hideLoading();
        if (e.message === '请求已取消') { toast('已取消'); return; }
        toast('生成失败: ' + e.message);
        debugLog('开始游戏失败: ' + e.message);
      }
    }

    function buildPreferenceText() {
      const p = state.preferences;
      let t = '→ pref | 违反→大纲无效\n';
      if (p.style) t += `  style=${p.style}\n`;
      if (p.length) t += `  len≥${p.length} beats=ceil(len/3000)\n`;
      if (p.scenes) t += `  scene=${p.scenes}(→location_ref)\n`;
      if (p.play) t += `  play=${p.play}(≥1beat→key_actions)\n`;
      if (p.position) t += `  pos=${p.position}(→required_world_entries)\n`;
      if (p.limits) t += `  limits=${p.limits}(→global_rules,全beat禁)\n`;
      if (p.orgasm !== '无要求') t += `  orgasm=${p.orgasm}(→milestone安排)\n`;
      if (p.cum) t += `  cum=${p.cum}(→sexual_milestone标记)\n`;
      if (p.pace) t += `  pace=${p.pace}\n`;
      if (p.outlineLength) t += `  outline=${p.outlineLength}\n`;
      return t;
    }

    let isProcessing = false;

    async function handleOption(optText) {
      if (!state.gameStarted) { toast('游戏尚未开始'); return; }
      if (isProcessing) { toast('请等待当前生成完成'); return; }
      isProcessing = true;
      debugLog(`[handleOption] 开始, history长度=${state.history.length}`);
      state.history.push({ role: 'user', content: optText });
      // 直接追加用户动作到 DOM，不重建整个故事区（避免摧毁正在流式的元素）
      const storyElPre = document.getElementById('storyMessages');
      const userMsgEl = document.createElement('div');
      userMsgEl.className = 'story-msg user-msg';
      userMsgEl.innerHTML = '<div class="msg-role">你</div><div class="msg-content">' + escapeHtml(optText) + '</div>';
      storyElPre.appendChild(userMsgEl);
      smartScrollToBottom(document.getElementById('mainStoryArea'));
      document.getElementById('optionsContainer').innerHTML = '';
      saveState();
      const storyEl = document.getElementById('storyMessages');
      let streamMsgEl = null;
      try {
        await checkAndSliceHistory();
        const narrativeSys = buildNarrativeSystemMessage();
        const chatMessages = state.history.filter(m => m.role !== 'system');
        const fullMessages = [{ role: 'system', content: narrativeSys }];
        const cardBlock = buildCardInjectionBlock(true);
        if (cardBlock) fullMessages.push({ role: 'system', content: cardBlock });
        // 动态上下文归入 user
        let userCtx = '';
        const wbBlock = buildWorldInjectionBlock();
        if (wbBlock) userCtx += wbBlock + '\n';
        if (state.outline) userCtx += buildOutlineContext() + '\n';
        if (state.summaryBlocks.length) userCtx += '早期剧情摘要:\n' + state.summaryBlocks.join('\n---\n') + '\n';
        if (userCtx) fullMessages.push({ role: 'user', content: userCtx });
        fullMessages.push(...chatMessages);
        streamMsgEl = document.createElement('div');
        streamMsgEl.className = 'story-msg';
        streamMsgEl.innerHTML = '<div class="msg-content"></div>';
        storyEl.appendChild(streamMsgEl);
        smartScrollToBottom(document.getElementById('mainStoryArea'));
        const contentEl = streamMsgEl.querySelector('.msg-content');
        // ★ 先占位写入 history，流式过程中实时更新
        const assistantMsg = { role: 'assistant', content: '' };
        state.history.push(assistantMsg);
        let story = '';
        for (let retry = 0; retry < 3; retry++) {
          if (retry > 0) {
            debugLog(`[handleOption] 输出为空，重试第${retry}次`);
            assistantMsg.content = '';
            contentEl.textContent = '';
          }
          story = await callAPI(fullMessages, {
            maxTokens: state.apiMaxTokens, temperature: 0.9, enableTools: true,
            onChunk: ({ full }) => {
              assistantMsg.content = full;
              rAFUpdateContent(contentEl, full);
            }
          });
          if (!assistantMsg.content && story) assistantMsg.content = story;
          if (assistantMsg.content) break;
        }
        debugLog(`[handleOption] callAPI完成, story长度=${story.length}, assistantMsg长度=${assistantMsg.content.length}`);
        saveState();

        maybeAdvanceBeat(story);

        const optsEl = document.getElementById('optionsContainer');
        const origHTML = optsEl.innerHTML;
        optsEl.innerHTML = '<div style="color:#888;padding:8px;font-size:13px;">生成选项...</div>';
        const opts = await generateOptionsFromContext();
        optsEl.innerHTML = origHTML;
        _flushStreamDom();
        state.currentOptions = opts; saveState(); updateUI();
      } catch (e) {
        hideLoading(); if (streamMsgEl) streamMsgEl.remove();
        if (e.message === '请求已取消') { toast('已取消'); return; }
        toast('失败: ' + e.message);
      } finally { isProcessing = false; }
    }

    async function handleCustomInput(text) {
      if (!state.gameStarted || !text.trim()) return;
      if (isProcessing) { toast('请等待当前生成完成'); return; }
      isProcessing = true;
      debugLog(`[handleCustomInput] 开始, history长度=${state.history.length}`);
      document.getElementById('customInput').value = '';  // ✅ 立即清空
      state.history.push({ role: 'user', content: text });
      // 直接追加用户动作到 DOM，不重建整个故事区（避免摧毁正在流式的元素）
      const storyElPre = document.getElementById('storyMessages');
      const userMsgEl = document.createElement('div');
      userMsgEl.className = 'story-msg user-msg';
      userMsgEl.innerHTML = '<div class="msg-role">你</div><div class="msg-content">' + escapeHtml(text) + '</div>';
      storyElPre.appendChild(userMsgEl);
      smartScrollToBottom(document.getElementById('mainStoryArea'));
      document.getElementById('optionsContainer').innerHTML = '';
      saveState();
      const storyEl = document.getElementById('storyMessages');
      let streamMsgEl = null;
      try {
        await checkAndSliceHistory();
        const narrativeSys = buildNarrativeSystemMessage();
        const chat = state.history.filter(m => m.role !== 'system');
        const fullMessages = [{ role: 'system', content: narrativeSys }];
        const cardBlock = buildCardInjectionBlock(true);
        if (cardBlock) fullMessages.push({ role: 'system', content: cardBlock });
        // 动态上下文归入 user
        let userCtx = '';
        const wbBlock = buildWorldInjectionBlock();
        if (wbBlock) userCtx += wbBlock + '\n';
        if (state.outline) userCtx += buildOutlineContext() + '\n';
        if (state.summaryBlocks.length) userCtx += '早期摘要:\n' + state.summaryBlocks.join('\n---\n') + '\n';
        if (userCtx) fullMessages.push({ role: 'user', content: userCtx });
        fullMessages.push(...chat);
        streamMsgEl = document.createElement('div');
        streamMsgEl.className = 'story-msg';
        streamMsgEl.innerHTML = '<div class="msg-content"></div>';
        storyEl.appendChild(streamMsgEl);
        smartScrollToBottom(document.getElementById('mainStoryArea'));
        const contentEl = streamMsgEl.querySelector('.msg-content');
        // ★ 先占位写入 history，流式过程中实时更新
        const assistantMsg = { role: 'assistant', content: '' };
        state.history.push(assistantMsg);
        let story = '';
        for (let retry = 0; retry < 3; retry++) {
          if (retry > 0) {
            debugLog(`[handleCustomInput] 输出为空，重试第${retry}次`);
            assistantMsg.content = '';
            contentEl.textContent = '';
          }
          story = await callAPI(fullMessages, {
            maxTokens: state.apiMaxTokens, temperature: 0.9, enableTools: true,
            onChunk: ({ full }) => {
              assistantMsg.content = full;
              rAFUpdateContent(contentEl, full);
            }
          });
          if (!assistantMsg.content && story) assistantMsg.content = story;
          if (assistantMsg.content) break;
        }
        debugLog(`[handleCustomInput] callAPI完成, story长度=${story.length}, assistantMsg长度=${assistantMsg.content.length}`);
        saveState();

        maybeAdvanceBeat(story);

        const optsEl = document.getElementById('optionsContainer');
        const origHTML = optsEl.innerHTML;
        optsEl.innerHTML = '<div style="color:#888;padding:8px;font-size:13px;">生成选项...</div>';
        const opts = await generateOptionsFromContext();
        optsEl.innerHTML = origHTML;
        _flushStreamDom();
        state.currentOptions = opts; saveState(); updateUI();
        document.getElementById('customInput').value = '';
      } catch (e) {
        hideLoading(); if (streamMsgEl) streamMsgEl.remove();
        if (e.message === '请求已取消') { toast('已取消'); return; }
        toast('失败: ' + e.message);
      } finally { isProcessing = false; }
    }


    async function checkAndSliceHistory() {
      const apiMax = state.apiMaxTokens || 384000;
      if (state.cumulativeTokens < apiMax) return;
      const chatMessages = state.history.filter(m => m.role !== 'system');
      if (!chatMessages.length) return;
      const KEEP_EXACT = 6;
      if (chatMessages.length <= KEEP_EXACT + 2) return;
      debugLog(`累计Token达${(state.cumulativeTokens/1000).toFixed(0)}K，触发压缩历史...`);
      const exactMessages = chatMessages.slice(-KEEP_EXACT);
      const toSummarize = chatMessages.slice(0, -KEEP_EXACT);
      if (!toSummarize.length) return;
      const summarySys = buildSummarySystemMessage();
      const feedText = toSummarize.map(m => `[${m.role}]: ${m.content}`).join('\n');
      const summaryReq = { role: 'user', content: '=== 待压缩历史 ===\n' + feedText + '\n\n=== 指令 ===\n按系统消息中的层级压缩。最近2轮保留原文，其余逐层压缩。' };
      const summary = await callAPI(
        [{ role: 'system', content: summarySys }, summaryReq],
        { maxTokens: state.apiMaxTokens, temperature: 0.3, trackUsage: false }
      );
      const label = state.summaryBlocks.length === 0 ? '早期剧情摘要' : `第${state.summaryBlocks.length + 1}次压缩`;
      state.summaryBlocks.push(`${label}:\n${summary}`);
      const systemMessages = state.history.filter(m => m.role === 'system');
      state.history = [...systemMessages, ...exactMessages];
      state.cumulativeTokens = Math.floor(state.cumulativeTokens * 0.25);
      updateCumulativeDisplay();
      saveState();
      debugLog(`压缩完成。保留最近${exactMessages.length}条原文 + ${systemMessages.length}条系统消息，累计token重置为${(state.cumulativeTokens/1000).toFixed(0)}K`);
    }

          wubby: '输入=酒馆WUBBY世界书。条目格式: [{key:"",content:""}]。'

        const targetHints = {
          auto: '自动判定。',

        return {
          system: BASE_SYSTEM_PROMPT,
          user: `convert | v4 | json_only

输入→V4标准格式。禁额外文本。

in: ${formatHints[format] || formatHints.auto}
out: ${targetHints[target] || targetHints.auto}

card_tpl: ${JSON.stringify(CARD_TEMPLATE_BASE, null, 2)}
world_tpl: ${JSON.stringify(WORLD_ENTRY_TEMPLATE, null, 2)}

→ out_json | {"card":{...}|null, "worldbook":{...}|null}
→ card_map | name→name | desc→personality.summary | scenario→scenario | first_mes→first_mes
  mes_example→{{user}}:...\\n{{char}}:... | 身体外观→physical(不明确强制推断)
→ world_map | NovelAI keys→triggers | insertion_order→priority(1000-order) | WUBBY key→name
→ rule | card和worldbook至少一个≠null | 简体中文 | 性器官直白术语

      async function executeConversion(previewOnly) {
        const rawInput = document.getElementById('convertInputArea').value.trim();
        if (!rawInput) { toast('请粘贴第三方数据'); return; }
        const format = document.getElementById('convertFormatSelect').value;
        const target = document.getElementById('convertTargetSelect').value;
        const statusEl = document.getElementById('convertStatus');
        const resultArea = document.getElementById('convertResultArea');
        statusEl.textContent = '转换中...';
        showLoading(); updateLoading('格式转换中...', 50);
        try {
          const p = buildConvertPrompt(rawInput, format, target);
          let resp = ''; let converted = null;
          for (let retry = 0; retry < 3; retry++) {
            if (retry > 0) { debugLog(`[格式转换] 输出无效，重试第${retry}次`); updateLoading(`重试转换...${retry+1}/3`, 30 + retry * 20); }
            resp = await callAPI([{role:'system',content:p.system},{role:'user',content:p.user}], {maxTokens:16384,temperature:0.5,trackUsage:false,enableTools:false});
            const jsonMatch = resp.match(/\{[\s\S]*\}/);
            if (jsonMatch) { try { converted = JSON.parse(jsonMatch[0]); break; } catch(e) { debugLog(`[格式转换] 解析失败: ${e.message}`); } }
          }
          hideLoading();
          if (!converted) { toast('转换失败: 输出无效，已重试3次'); statusEl.textContent = '失败'; return; }
          convertPendingData = converted;
          resultArea.classList.remove('hidden');
          if (converted.card) {
            document.getElementById('convertResultCards').value = JSON.stringify(converted.card, null, 2);
            document.getElementById('convertCardCount').textContent = '角色卡: ' + (converted.card.name || '(未命名)');
            document.getElementById('convertSaveCardBtn').classList.remove('hidden');
          } else {
            document.getElementById('convertResultCards').value = '(未提取到角色卡)';
            document.getElementById('convertCardCount').textContent = '角色卡: 无';
            document.getElementById('convertSaveCardBtn').classList.add('hidden');
          }
          if (converted.worldbook) {
            document.getElementById('convertResultWorld').value = JSON.stringify(converted.worldbook, null, 2);
            document.getElementById('convertWorldCount').textContent = '世界书: ' + (converted.worldbook.name || '(未命名)') + ' (' + ((converted.worldbook.entries || []).length) + '条目)';
            document.getElementById('convertSaveWorldBtn').classList.remove('hidden');
          } else {
            document.getElementById('convertResultWorld').value = '(未提取到世界书)';
            document.getElementById('convertWorldCount').textContent = '世界书: 无';
            document.getElementById('convertSaveWorldBtn').classList.add('hidden');
          }
          if (!converted.card && !converted.worldbook) toast('转换完成但未提取到有效数据');
          statusEl.textContent = previewOnly ? '预览完成' : '转换完成';
          if (!previewOnly) {
            if (convertPendingData.card) {
              convertPendingData.card.id = Date.now().toString(36);
              state.cards.push({ id: convertPendingData.card.id, name: convertPendingData.card.name || '转换角色卡', content: JSON.stringify(convertPendingData.card) });
              renderCardList(); toast('已保存角色卡');
            }
            if (convertPendingData.worldbook) {
              const wb = normalizeWorldBookResult(convertPendingData.worldbook, convertPendingData.worldbook.name || '转换世界书');
              wb.id = 'wb_' + Date.now();
              state.worldBooks.push(wb);
              if (window._renderWorldBookList) window._renderWorldBookList();
              toast('已保存世界书');
            }
            saveState(); convertPendingData = null;
          }
        } catch(e) { hideLoading(); toast('转换失败: '+e.message); statusEl.textContent = '失败'; }
      }

      // === 世界书：编辑/删除（事件委托） ===
      document.getElementById('worldBookList').addEventListener('click', e => {
        const editBtn = e.target.closest('[data-edit-wb]');
        const delBtn = e.target.closest('[data-del-wb]');
        if (editBtn) {
          const idx = parseInt(editBtn.dataset.editWb);
          if (idx >= 0 && idx < state.worldBooks.length) {
            state.editingCardIndex = idx;
            document.getElementById('editCardContent').value = JSON.stringify(state.worldBooks[idx], null, 2);
            document.getElementById('editCardModal').classList.remove('hidden');
          }
        }
        if (delBtn) {
          const idx = parseInt(delBtn.dataset.delWb);
          if (idx >= 0 && idx < state.worldBooks.length) {
            confirmAction(`删除世界书 "${state.worldBooks[idx].name}"？`, () => {
              state.activeWorldBooks = state.activeWorldBooks.filter(aw => aw.id !== state.worldBooks[idx].id);
              state.worldBooks.splice(idx, 1);
              saveState(); window._renderWorldBookList(); toast('已删除');
            });
          }
        }
      });



      document.getElementById('debugToggleBtn').addEventListener('click', () => {
        state.debugEnabled = !state.debugEnabled;
        const panel = document.getElementById('debugPanel');
        if (state.debugEnabled) {
          panel.classList.remove('hidden');
          refreshDebugPanel();
        } else {
          panel.classList.add('hidden');
        }
      });
      document.getElementById('debugCloseBtn').addEventListener('click', () => { state.debugEnabled = false; document.getElementById('debugPanel').classList.add('hidden'); });
    }

    function initApp() {
    loadState();
    if (!state.models || !state.models.length) state.models = ['deepseek-v4-flash', 'deepseek-v4-pro'];
    if (!state.model || !state.models.includes(state.model)) state.model = state.models[0];
    if (!state.reasoningEffort) state.reasoningEffort = 'high';
    if (!state.apiMaxTokens) state.apiMaxTokens = 384000;
    if (state.cumulativeTokens === undefined) state.cumulativeTokens = 0;
    if (!state.narrativeModule) state.narrativeModule = JSON.parse(JSON.stringify(DEFAULT_NARRATIVE_MODULE));
    if (!state.activeCards) state.activeCards = [];
    if (!state.currentOptions) state.currentOptions = [];
    if (!state.worldBooks) state.worldBooks = [];
    if (!state.activeWorldBooks) state.activeWorldBooks = [];
    state.history = (state.history || []).filter(m => m.role !== 'system');  // ← 新增：清理旧数据中残留的system消息

      document.getElementById('apiBaseUrl').value = state.apiBaseUrl;
      document.getElementById('apiKey').value = state.apiKey;
      document.getElementById('apiModelSelect').value = state.model;
      document.getElementById('apiReasoningEffort').value = state.reasoningEffort || 'high';
      document.getElementById('apiMaxTokens').value = state.apiMaxTokens || 384000;
      renderSettings();
      updateUI();
      init();
      if (!state.apiKey || !state.apiBaseUrl) {
        document.getElementById('apiSetupModal').classList.remove('hidden');
        toast('请先配置API');
      } else if (!state.cards.length) {
        toast('请创建角色卡');
      } else if (!state.activeCards.length) {
        toast('请导入角色卡并开始游戏');
      } else if (!state.gameStarted) {
        startGame();
      }
    }
    window.addEventListener('DOMContentLoaded', initApp);
  </script>
